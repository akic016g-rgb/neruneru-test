<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねるねるシアター ─ 企画概要</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/*
  ═══════════════════════════════════════
  ★ 編集ガイド ★
  - 日程変更 → 「DEADLINE」で検索
  - フォームURL → 「FORM_URL」で検索
  - 担当者変更 → 「STAFF」で検索
  - コンテンツ追加 → .content-card をコピー
  ═══════════════════════════════════════
*/
:root {
  --bg: #12101e;
  --bg-grad-top: #1e1838;
  --surface: #1c1832;
  --surface-light: #252040;
  --surface-glow: #2d2650;
  --gold: #c9a84c;
  --gold-dim: #8a7535;
  --gold-soft: #e8d5a0;
  --lavender: #9b7dd4;
  --lavender-light: #c4a8f0;
  --lavender-pale: #ddd0f0;
  --twilight-pink: #d4a0c0;
  --twilight-sky: #7868a8;
  --cream: #ede8f5;
  --cream-dim: #9a92a8;
  --border: #302a50;
  --border-light: #3d3560;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Header ─── */
.header {
  position: relative;
  text-align: center;
  padding: 50px 20px 36px;
  background: linear-gradient(180deg, #2a2048 0%, #1a1530 60%, var(--bg) 100%);
  overflow: hidden;
}
.header::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
}
.header-stars {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3), transparent),
              radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.2), transparent),
              radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.15), transparent),
              radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.2), transparent),
              radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.header-orn { font-size: 13px; color: var(--gold-dim); letter-spacing: 6px; margin-bottom: 14px; position: relative; }
.header-moon { font-size: 36px; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 15px rgba(155,125,212,0.4)); position: relative; }
.header-title {
  font-family: 'Shippori Mincho', serif; font-size: 30px; font-weight: 800;
  color: var(--cream); letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(155,125,212,0.3); line-height: 1.3; position: relative;
}
.header-subtitle {
  font-family: 'Shippori Mincho', serif; font-size: 13px;
  color: var(--gold); letter-spacing: 3px; margin-top: 10px; position: relative;
}
.header-line {
  width: 50px; height: 1px; margin: 18px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  position: relative;
}

/* ─── Main ─── */
.main { max-width: 440px; margin: 0 auto; padding: 0 16px 40px; }

/* ─── Story ─── */
.story {
  text-align: center; padding: 30px 0 20px;
  font-family: 'Shippori Mincho', serif;
  font-size: 14px; color: var(--cream); line-height: 2.2;
}
.story em { font-style: normal; color: var(--lavender-light); }

/* ─── Section Divider ─── */
.divider { display: flex; align-items: center; gap: 12px; margin: 32px 0 18px; }
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-light), transparent);
}
.divider-text {
  font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 600;
  color: var(--gold); letter-spacing: 3px; white-space: nowrap;
}

/* ─── Tabs ─── */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.tab {
  padding: 8px 14px; border-radius: 10px; border: none;
  background: var(--surface-light); color: var(--cream-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; font-family: inherit; transition: all 0.2s;
}
.tab.active { background: var(--lavender); color: #fff; font-weight: 700; }
.view { display: none; }
.view.active { display: block; }

/* ─── Content Card ─── */
.content-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 12px; overflow: hidden;
  cursor: pointer; transition: all 0.2s;
}
.content-card:hover { border-color: var(--border-light); }
.cc-top { padding: 16px 16px 12px; }
.cc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.cc-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
.cc-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(155,125,212,0.1); border: 1px solid rgba(155,125,212,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.cc-name { font-size: 15px; font-weight: 700; color: var(--cream); line-height: 1.4; }
.cc-arrow { color: var(--cream-dim); font-size: 14px; transition: transform 0.2s; padding: 4px; }
.cc-arrow.open { transform: rotate(180deg); }
.cc-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 700;
}
.badge-pri-high { background: #2e1a2a; color: #e88aaa; }
.badge-pri-mid { background: #2e2a1a; color: #e8c86a; }
.badge-confirmed { background: #1a2e1f; color: #6bcf7f; }
.badge-planning { background: #2e2a1a; color: #e8c86a; }
.badge-new { background: rgba(155,125,212,0.2); color: var(--lavender-light); }

.cc-detail { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 14px; }
.cc-detail.show { display: block; }
.cc-row { display: flex; gap: 8px; margin-bottom: 8px; }
.cc-label { color: var(--cream-dim); font-size: 12px; min-width: 60px; flex-shrink: 0; }
.cc-value { font-size: 12px; color: var(--cream); line-height: 1.6; }
.cc-notes {
  background: var(--surface-light); border-radius: 8px; padding: 10px 12px;
  font-size: 12px; color: var(--cream-dim); line-height: 1.8; margin-top: 6px;
}

/* ─── Staff ─── */
.staff-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: 10px; padding: 12px;
  border: 1px solid var(--border); margin-bottom: 8px;
}
.staff-icon {
  width: 32px; height: 32px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.staff-info { flex: 1; }
.staff-task { font-size: 13px; font-weight: 700; color: var(--cream); margin-bottom: 2px; }
.staff-name { font-size: 12px; color: var(--lavender-light); }
.staff-note { font-size: 11px; color: var(--cream-dim); margin-top: 2px; }

/* ─── Schedule ─── */
.tl-item { display: flex; gap: 12px; }
.tl-dot-col { display: flex; flex-direction: column; align-items: center; width: 16px; }
.tl-dot { width: 10px; height: 10px; border-radius: 5px; flex-shrink: 0; }
.tl-line { width: 1px; flex: 1; min-height: 16px; background: var(--border); }
.tl-content { flex: 1; padding-bottom: 18px; }
.tl-date { font-family: 'Shippori Mincho', serif; font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.tl-task { font-size: 12px; color: var(--cream-dim); line-height: 1.6; }

/* ─── Budget ─── */
.budget-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.budget-row:last-child { border-bottom: none; }
.budget-item { color: var(--cream); }
.budget-price { color: var(--gold); font-weight: 600; }
.budget-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; margin-top: 10px;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px; font-size: 14px; font-weight: 700;
}

/* ─── Other items ─── */
.other-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 10px;
}
.other-title { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.other-title span:first-child { font-size: 18px; }
.other-title span:last-child { font-size: 14px; font-weight: 700; color: var(--cream); }
.other-desc { font-size: 12px; color: var(--cream-dim); line-height: 1.7; }

/* ─── Footer ─── */
.footer {
  text-align: center; padding: 28px 20px; margin-top: 10px;
  border-top: 1px solid var(--border);
}
.footer-orn { font-size: 12px; color: var(--gold-dim); letter-spacing: 4px; margin-bottom: 8px; }
.footer-text { font-size: 12px; color: var(--cream-dim); line-height: 1.8; }
</style>
</head>

function badge(label, cls) { return `<span class="badge ${cls}">${label}</span>`; }

function renderContents() {

        <div class="cc-top">
          <div class="cc-header">
            <div class="cc-title-wrap">
              <div class="cc-icon">${c.icon}</div>
              <span class="cc-name">${c.name}</span>
            </div>
            <span class="cc-arrow ${isOpen?'open':''}">▾</span>
          </div>
          <div class="cc-badges">${badges.join('')}</div>
        </div>
        <div class="cc-detail ${isOpen?'show':''}">
          <div class="cc-row"><span class="cc-label">締切</span><span class="cc-value" style="color:var(--gold)">${c.deadline}</span></div>
          <div class="cc-row"><span class="cc-label">担当</span><span class="cc-value" style="color:var(--lavender-light)">${c.staff}</span></div>
          <div class="cc-notes">${c.detail.replace(/\n/g,'<br>')}</div>
        </div>
      </div>`;
  }).join('');
}

function renderStaff() {
  document.getElementById("staffList").innerHTML = staffData.map(s => `
    <div class="staff-card">
      <div class="staff-icon" style="background:rgba(155,125,212,0.1);border:1px solid rgba(155,125,212,0.2)">${s.icon}</div>
      <div class="staff-info">
        <div class="staff-task">${s.task}</div>
        <div class="staff-name">${s.name}</div>
        ${s.note ? `<div class="staff-note">※ ${s.note}</div>` : ''}
      </div>
    </div>`).join('') + `
    <div style="margin-top:14px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--cream-dim);line-height:1.7;">
      ※ まだ確定ではありません。これから個別にご相談させていただきます。<br>
      ※ 難しい場合は遠慮なく言ってください 🙏
    </div>`;
}

function renderTimeline() {
  document.getElementById("timeline").innerHTML = tlData.map((t,i) => `
    <div class="tl-item">
      <div class="tl-dot-col">
        <div class="tl-dot" style="background:${t.color};${t.date.includes('🎂')?'box-shadow:0 0 8px rgba(212,160,192,0.5)':''}"></div>
        ${i<tlData.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-content">
        <div class="tl-date" style="color:${t.color}">${t.date}</div>
        ${t.tasks.map(task=>`<div class="tl-task">${t.date.includes('🎂')?'🎉 ':'• '}${task}</div>`).join('')}
      </div>
    </div>`).join('');
}

function renderBudget() {
  document.getElementById("budgetList").innerHTML = budgetData.map(b => `
    <div class="budget-row">
      <span class="budget-item">${b.item}</span>
      <span class="budget-price">${b.price}</span>
    </div>`).join('');
}

function renderOther() {
  document.getElementById("otherList").innerHTML = otherData.map(o => `
    <div class="other-card">
      <div class="other-title"><span>${o.icon}</span><span>${o.title}</span></div>
      <div class="other-desc">${o.desc}</div>
    </div>`).join('');
}

function toggle(id) { expandedId = expandedId===id ? null : id; renderContents(); }

document.getElementById("mainTabs").addEventListener("click", function(e) {
  const btn = e.target.closest(".tab"); if(!btn) return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+btn.dataset.view).classList.add("active");
});

renderContents(); renderStaff(); renderTimeline(); renderBudget(); renderOther();
</script>
</body>
</html>
